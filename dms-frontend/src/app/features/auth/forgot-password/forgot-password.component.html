<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-950 font-['Outfit']">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/5 pointer-events-none"></div>

    <div class="relative w-full max-w-lg px-6 py-12 z-10">
        <div
            class="w-full bg-white/[0.03] backdrop-blur-2xl p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white/10 relative overflow-hidden">
            <!-- Header -->
            <div class="relative text-center mb-10">
                <div class="inline-flex items-center justify-center p-4 bg-indigo-600/20 rounded-3xl shadow-xl mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-3.257a2 2 0 01.586-1.414l9-9a6 6 0 0110.357 5.257z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-tight mb-2">{{ 'AUTH.FORGOT_PASSWORD.TITLE' |
                    translate }}</h2>
                <p class="text-slate-400 font-medium">{{ 'AUTH.FORGOT_PASSWORD.SUBTITLE' | translate }}</p>
            </div>

            <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" class="space-y-6">
                <div class="space-y-2">
                    <label for="email" class="block ml-1 text-sm font-medium text-slate-300">{{
                        'AUTH.FORGOT_PASSWORD.EMAIL_LABEL' |
                        translate }}</label>
                    <div class="relative">
                        <input type="email" id="email" [(ngModel)]="email" name="email" required
                            class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white focus:ring-2 focus:ring-indigo-500 transition-all"
                            [placeholder]="'AUTH.FORGOT_PASSWORD.EMAIL_PLACEHOLDER' | translate">
                    </div>
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-2">
                    <span *ngIf="isLoading"
                        class="animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-t-white"></span>
                    {{ 'AUTH.FORGOT_PASSWORD.BTN_SEND_OTP' | translate }}
                </button>

                <div class="text-center">
                    <a routerLink="/login"
                        class="text-sm font-bold text-slate-500 hover:text-indigo-400 transition-colors uppercase tracking-widest">{{
                        'AUTH.FORGOT_PASSWORD.BACK_TO_LOGIN' | translate }}</a>
                </div>
            </form>
        </div>
    </div>
</div>
