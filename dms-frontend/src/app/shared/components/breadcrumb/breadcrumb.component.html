<nav *ngIf="breadcrumbs.length > 0"
    class="flex px-5 py-3 text-slate-400 bg-slate-900/50 backdrop-blur-sm rounded-2xl border border-white/5 mb-6"
    aria-label="Breadcrumb">
    <ol class="inline-flex items-center space-x-1 md:space-x-3">
        <li class="inline-flex items-center">
            <a routerLink="/dashboard"
                class="inline-flex items-center text-sm font-medium hover:text-white transition-colors">
                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path
                        d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z">
                    </path>
                </svg>
                {{ 'BREADCRUMB.HOME' | translate }}
            </a>
        </li>
        <li *ngFor="let breadcrumb of breadcrumbs; let last = last">
            <div class="flex items-center">
                <svg class="w-6 h-6 text-slate-600" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                        clip-rule="evenodd"></path>
                </svg>
                <a *ngIf="!last" [routerLink]="breadcrumb.url"
                    class="ml-1 text-sm font-medium hover:text-white md:ml-2 transition-colors">
                    {{ breadcrumb.label | translate }}
                </a>
                <span *ngIf="last" class="ml-1 text-sm font-bold text-indigo-400 md:ml-2">
                    {{ breadcrumb.label | translate }}
                </span>
            </div>
        </li>
    </ol>
</nav>
