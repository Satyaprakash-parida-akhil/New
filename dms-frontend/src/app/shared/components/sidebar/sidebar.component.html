<aside class="sidebar-container bg-slate-950 text-white flex flex-col border-r border-white/5 font-['Outfit']">
    <!-- Brand Section -->
    <div class="brand-section">
        <div class="logo-box">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        </div>
        <h2 class="brand-title">DMS Portal</h2>
    </div>

    <!-- Navigation -->
    <nav class="nav-content scrollbar-hide">
        <div class="nav-group">
            <p class="nav-section-label">Operations</p>
            <ul class="nav-list">
                <li *ngFor="let menu of allowedMenus">
                    <a [routerLink]="menu.path" routerLinkActive="active-menu-item" class="nav-link group">
                        <!-- Active Indicator Beam -->
                        <div class="active-beam"></div>

                        <!-- Icon Wrapper -->
                        <div class="icon-wrapper group-hover:scale-110 transition-transform duration-300">
                            <!-- Home -->
                            <svg *ngIf="menu.icon === 'home'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                            <!-- Dashboard -->
                            <svg *ngIf="menu.icon === 'grid'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                            </svg>
                            <!-- Upload -->
                            <svg *ngIf="menu.icon === 'upload'" class="w-5 h-5 text-fuchsia-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            <!-- Review Queue -->
                            <svg *ngIf="menu.icon === 'check-square'" class="w-5 h-5 text-amber-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                            <!-- Assign Document -->
                            <svg *ngIf="menu.icon === 'user-plus'" class="w-5 h-5 text-emerald-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                            <!-- User Requests -->
                            <svg *ngIf="menu.icon === 'users'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                            </svg>
                            <!-- Approved Users -->
                            <svg *ngIf="menu.icon === 'user-check'" class="w-5 h-5 text-blue-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                        </div>
                        <span class="label-text">{{ menu.label }}</span>

                        <!-- Premium Hover Glow -->
                        <div class="hover-glow"></div>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Footer Visual -->
    <div class="sidebar-footer">
        <div class="status-indicator">
            <span class="pulse-dot"></span>
            <span class="status-text">System Core Online</span>
        </div>
    </div>
</aside>
